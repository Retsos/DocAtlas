services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/DocAtlas
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
